    subdir: app
    gradle:
      - yes
    output: build/outputs/apk/release/CloudbasePredictor_v$$VERSION$$_armeabi-v7a.apk
    gradleprops:
      - ABI_FILTERS=armeabi-v7a

  - versionName: 0.0.4
    versionCode: 42
    commit: v0.0.4
    subdir: app
    gradle:
      - yes
    output: build/outputs/apk/release/CloudbasePredictor_v$$VERSION$$_arm64-v8a.apk
    gradleprops:
      - ABI_FILTERS=arm64-v8a

  - versionName: 0.0.4
    versionCode: 43
    commit: v0.0.4
    subdir: app
    gradle:
      - yes
    output: build/outputs/apk/release/CloudbasePredictor_v$$VERSION$$_x86.apk
    gradleprops:
      - ABI_FILTERS=x86

  - versionName: 0.0.4
    versionCode: 44
    commit: v0.0.4
    subdir: app
    gradle:
      - yes
    output: build/outputs/apk/release/CloudbasePredictor_v$$VERSION$$_x86_64.apk
    gradleprops:
      - ABI_FILTERS=x86_64

AutoUpdateMode: Version
UpdateCheckMode: Tags ^v
VercodeOperation:
