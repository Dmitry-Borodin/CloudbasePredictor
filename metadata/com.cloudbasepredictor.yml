AutoName: Cloudbase Predictor
Summary: Weather forecasts for soaring and free-flight pilots
Description: |-
  Cloudbase Predictor helps paragliding, hang-gliding, and sailplane pilots assess
  flying conditions for a selected location.

  It visualises atmospheric forecast soundings from Open-Meteo with thermic
  forecasts, wind profiles, Stüve diagrams, and cloud-cover charts. You can pick
  a point on an OpenStreetMap-based map, save favourite flying sites, compare
  forecast models, and use dark mode in the field.

  Forecast data is provided by Open-Meteo. Map tiles are loaded from OpenFreeMap,
  OpenMapTiles, and OpenStreetMap contributors.

